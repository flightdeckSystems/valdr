# Per-crate unsafe-block ceilings. Enforced by the chassis unsafe-budget hook.
#
# Default ceiling for unlisted crates: 0. Raising a ceiling requires
# editing this file in a commit that explains why.
#
# Pilot crates: all start at 0 (no unsafe expected for byte-string parsing,
# command dispatch, in-memory data). Later crates that wrap OS / modules
# ABI will get raised ceilings.

[crates]
"redis-types"     = 0
"redis-protocol"  = 0
# Raised to 2 for the aarch64 monotonic hardware-counter reader in
# monotonic.rs. Both unsafe blocks are inline assembly `mrs` reads of CPU timer
# registers (`cntvct_el0`, `cntfrq_el0`): no pointers, no memory access.
"redis-core"      = 2
# Raised to 1 for the fork(2)-based BGSAVE in persist.rs (Round 19 Session 1D).
# The single unsafe block covers libc::fork + libc::_exit in the child path.
# This is the standard Unix COW-snapshot mechanism; no other unsafe is expected.
"redis-commands"  = 1
# Raised to 1 for the BGSAVE child reaper in main.rs (Round 19 Session 1D).
# The single unsafe block calls libc::waitpid(WNOHANG) to reap the fork child
# without blocking. Necessary companion to the fork in redis-commands::persist.
"redis-server"    = 1
